# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: test-coverage.yaml

permissions: read-all

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2
          needs: coverage

      - name: Test coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov)
        shell: Rscript {0}

      # Debug: confirm the secret actually reached the runner.
      # The token itself is masked in logs; we only print its length.
      - name: Check CODECOV_TOKEN is set
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [ -z "$CODECOV_TOKEN" ]; then
            echo "::warning ::CODECOV_TOKEN secret is empty — coverage upload will be tokenless and likely rejected."
          else
            echo "CODECOV_TOKEN is set (length=${#CODECOV_TOKEN})."
          fi

      - uses: codecov/codecov-action@v5
        # Codecov requires an upload token even on public repos as of
        # 2024+. Set it once on the repo: https://codecov.io → link
        # ksonda/edr4r → copy the upload token → GitHub repo Settings →
        # Secrets and variables → Actions → New repository secret named
        # `CODECOV_TOKEN`. If the upload still fails the rest of the
        # run stays green (continue-on-error).
        continue-on-error: true
        env:
          # Some codecov-action versions read the env var rather than
          # the `with: token:` input. Set both to belt-and-braces.
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          fail_ci_if_error: false
          files: ./cobertura.xml
          plugin: noop
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Show testthat output
        if: always()
        run: |
          ## --------------------------------------------------------------------
          find '${{ runner.temp }}/package' -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
