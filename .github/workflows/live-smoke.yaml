name: Live EDR interoperability smoke checks

on:
  schedule:
    # Weekly is frequent enough to catch compatibility drift without treating
    # any external endpoint as an availability monitor. Met Office Labs is a
    # non-operational demonstrator; every live probe below is non-blocking.
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  usgs-wwdh:
    name: USGS and WWDH pagination/batch
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.
          needs: check

      - name: Check bounded pagination and station batching
        id: smoke
        continue-on-error: true
        timeout-minutes: 2
        run: Rscript tools/live-smoke-pagination.R

      - name: Summarize result
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.smoke.outcome }}" = "success" ]; then
            echo "### USGS / WWDH: compatible" >> "$GITHUB_STEP_SUMMARY"
            echo "Bounded cursor pagination, station batching, and offset pagination passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### USGS / WWDH: probe failed (non-blocking)" >> "$GITHUB_STEP_SUMMARY"
            echo "Inspect the smoke-step log for endpoint availability or interoperability drift." >> "$GITHUB_STEP_SUMMARY"
          fi

  metoffice-labs:
    name: Met Office Labs demonstrator
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.
          needs: check

      - name: Check capabilities, instances, terrain, and population grid
        id: smoke
        # The demonstrator has no availability guarantee. Record drift in the
        # step outcome, but do not turn an external lab outage into a red build.
        continue-on-error: true
        timeout-minutes: 2
        run: Rscript tools/live-smoke-metoffice.R

      - name: Summarize result
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.smoke.outcome }}" = "success" ]; then
            echo "### Met Office Labs: compatible" >> "$GITHUB_STEP_SUMMARY"
            echo "Capability, instance-locations, terrain-position, and population-grid probes passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Met Office Labs: probe failed (non-blocking)" >> "$GITHUB_STEP_SUMMARY"
            echo "This endpoint is a non-operational technical demonstrator; inspect the smoke-step log for outage or compatibility drift." >> "$GITHUB_STEP_SUMMARY"
          fi
