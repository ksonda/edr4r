name: Browser smoke tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "R/map.R"
      - "R/map-stations.R"
      - "R/viz-utils.R"
      - "tests/testthat/test-map.R"
      - "vignettes/cross-endpoint-water-context.Rmd"
      - "vignettes/cross-endpoint-water-context.Rmd.orig"
      - "vignettes/cross-endpoint-water-context-full/**"
      - ".github/scripts/map-browser-smoke.R"
      - ".github/workflows/browser-smoke.yaml"

permissions: read-all

jobs:
  map-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            local::.
            any::chromote
          needs: check

      - name: Execute edr_map in headless Chrome
        run: Rscript .github/scripts/map-browser-smoke.R
