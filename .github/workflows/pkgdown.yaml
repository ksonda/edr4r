# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main, master, dev]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      EDR4R_FULL_VIGNETTES: "true"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: |
          site_url <- if (Sys.getenv("GITHUB_REF_NAME") == "dev") {
            "https://ksonda.github.io/edr4r/dev/"
          } else {
            "https://ksonda.github.io/edr4r/"
          }
          pkgdown::build_site_github_pages(
            new_process = FALSE,
            install = FALSE,
            override = list(url = site_url)
          )
        shell: Rscript {0}

      - name: Deploy dev docs to GitHub pages 🚀
        if: github.event_name != 'pull_request' && github.ref_name == 'dev'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
          target-folder: dev

      - name: Deploy release docs to GitHub pages 🚀
        if: >-
          github.event_name == 'release' ||
          ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          (github.ref_name == 'main' || github.ref_name == 'master'))
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
